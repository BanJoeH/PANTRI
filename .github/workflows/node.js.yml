# This workflow runs on PRs into master: it checks formatting, runs the test
# suite, and verifies a production build can be produced.
# https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on:
  pull_request:
    branches: [master]
    paths-ignore:
      - "package.json"
      - "RELEASE.md"
      - "CHANGELOG.md"
      - "README.md"

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      # Vite inlines REACT_APP_* env vars at build time. .env is gitignored,
      # so we seed it from the committed example (Firebase web keys aren't
      # secrets — security is enforced via Firestore rules).
      - name: Seed env from .env.example
        run: cp .env.example .env

      - name: Build
        run: npm run build
